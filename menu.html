<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Bakso Amba</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #ffd4a2;
        }

        .header{
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
        }

        .logo-area{
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid red;
        }

        .nama{
            color: red;
            font-size: 28px;
            font-weight: bold;
            font-family: "Angkor", serif;
            font-weight: 400;
            font-style: normal;
        }

        .menu{
            display: flex;
            gap: 20px;
            margin: auto;
        }

        .menu a{
            color: red;
            text-decoration: none;
            padding: 10px 15px;
            transition: 0.3s;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            font-family: "Angkor", serif;
            font-weight: 400;
            font-style: normal;
        }

        .menu a:hover{
            background-color: white;
            color: black;
        }

        .judul{
            text-align: center;
            margin: 30px 0;
            font-size: 60px;
            color: black;
        }

        .container{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 20px;
        }

        .card{
            background-color: white;
            width: 250px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover{
            transform: scale(1.05);
        }

        .card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h2{
            text-align: center;
            padding: 15px;
            color: #333;
        }

        .btn{
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
        }

        .btn a{
            text-decoration: none;
            background-color: red;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn a:hover{
            background-color: black;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

    <div class="header">

        <div class="logo-area">
            <img src="logo bakso.png" class="logo">
            <div class="nama">Ambang Bangso</div>
        </div>

        <div class="menu">
            <a href="home.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

    </div>

    <h1 class="judul"><b>Menu Bakso Amba</b></h1>

    <div class="container">

        <div class="card">
            <a href="contact.html"><img src="bakso biasa.png"></a>
            <h2>Bakso Biasa</h2>
        </div>

        <div class="card">
           <a href="contact.html"><img src="bakso urat.png"></a> 
            <h2>Bakso Urat</h2>
        </div>

        <div class="card">
            <a href="contact.html"><img src="bakso beranak.png"></a>
            <h2>Bakso Beranak</h2>
        </div>

        <div class="card">
            <a href="contact.html"><img src="bakso keju.png"></a>
            <h2>Bakso Keju</h2>
        </div>

        <div class="card">
            <a href="contact.html"><img src="bakso mercon.png"></a>
            <h2>Bakso Mercon</h2>
        </div>

        <div class="card">
            <a href="contact.html"><img src="bakso telur.png"></a>
            <h2>Bakso Telur</h2>
        </div>

        <div class="card">
            <a href="contact.html"><img src="mie ayam.png"></a>
            <h2>Mie Ayam</h2>
        </div>

        <div class="card">
            <a href="contact.html"><img src="mie ayam bakso.png"></a>
            <h2>Mie Ayam Bakso</h2>
        </div>

        <div class="btn">
                <a href="home.html">Back</a>
                <a href="about.html">Next</a>
            </div>

    </div>

</body>
</html>
