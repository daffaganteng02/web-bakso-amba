<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Bakso Amba</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #ffd4a2;
        }

        .header{
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
        }

        .logo-area{
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid red;
        }

        .nama{
            color: red;
            font-size: 28px;
            font-weight: bold;
            font-family: "Angkor", serif;
            font-weight: 400;
            font-style: normal;
        }

        .menu{
            display: flex;
            gap: 20px;
            margin: auto;
        }

        .menu a{
            color: red;
            text-decoration: none;
            padding: 10px 15px;
            transition: 0.3s;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            font-family: "Angkor", serif;
            font-weight: 400;
            font-style: normal;
        }

        .menu a:hover{
            background-color: white;
            color: black;
        }

        .judul{
            text-align: center;
            margin: 30px 0;
            font-size: 60px;
            color: black;
        }

        .container{
            width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        .container h1{
            text-align: center;
            margin-bottom: 25px;
            color: black;
        }

        .social{
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #f5f5f5;
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .social:hover{
            transform: scale(1.03);
            background-color: #e3e3e3;
        }

        .social img{
            width: 50px;
            height: 50px;
        }

        .social a{
            text-decoration: none;
            color: black;
            font-size: 18px;
            font-weight: bold;
        }

        .btn{
            margin-top: 25px;
        }

        .btn a{
            text-decoration: none;
            background-color: red;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
            font-weight: bold;
            display: inline-block;
        }

        .btn a:hover{
            background-color: black;
            transform: scale(1.05);
        }
        
    </style>
</head>
